server {
    listen __PORT__;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every unknown path returns index.html so client-side
    # routes work if we add them later.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Basic security headers. CSP is intentionally loose for now; tighten when
    # the list of third-party endpoints stabilises.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
