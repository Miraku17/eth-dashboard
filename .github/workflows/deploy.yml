# Deploy main → VPS over SSH.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST     — VPS hostname or IP
#   SSH_USER     — login user (e.g. `deploy` or `root`)
#   SSH_KEY      — private key matching an authorized_keys entry on the VPS
#   DEPLOY_PATH  — absolute path to the repo checkout on the VPS
# Optional:
#   SSH_PORT     — defaults to 22
#   EXTRA_ENV    — multi-line `KEY=VALUE` block. On every deploy, any KEY
#                  in this secret that's MISSING from the VPS .env gets
#                  appended (idempotent; never overwrites). Used for new
#                  Dune query IDs / API keys without SSH'ing in. Comments
#                  (`# ...`) and blank lines are skipped. If anything was
#                  appended, the worker + api containers are force-recreated
#                  so they pick up the new env.
#
# Behaviour:
#   • workflow_dispatch  → always runs, with optional "force full rebuild" toggle
#   • push to main       → disabled until you flip ENABLE_AUTO_DEPLOY below to
#                          true (so the first run is intentional and you can
#                          watch it from the Actions tab)
#   • Only services whose source paths changed are rebuilt. A change to
#     docker-compose.yml or the workflow itself triggers a full rebuild.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Rebuild & restart every service regardless of changed paths"
        type: boolean
        default: false
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      compose: ${{ steps.filter.outputs.compose }}
      caddy: ${{ steps.filter.outputs.caddy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            migrations:
              - 'backend/alembic/versions/**'
            compose:
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            caddy:
              - 'Caddyfile'

  deploy:
    needs: changes
    runs-on: ubuntu-latest
    # Gate auto-deploy on push behind a manual flip. The workflow_dispatch path
    # is always allowed so you can deploy from the Actions tab without flipping
    # this. Once you've verified a manual deploy works end-to-end, change this
    # condition to: if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH,BACKEND,FRONTEND,MIGRATIONS,COMPOSE,CADDY,FORCE,EXTRA_ENV
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # Compose CLI prefix used for every command on the VPS. The prod
            # override swaps the Vite dev server for the nginx static build and
            # drops the dev bind mount + anonymous node_modules volume.
            DC="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            echo "→ git fetch && reset to origin/main"
            git fetch --prune origin
            git reset --hard origin/main

            # ── Sync EXTRA_ENV secret into the VPS .env (idempotent) ────────
            # Append any KEY= line from EXTRA_ENV that isn't already present
            # in .env. Never overwrites existing keys. Skips comments and
            # blank lines. Touches .env only if something was actually added,
            # so we can decide downstream whether to force-recreate worker+api
            # to pick up the new env.
            #
            # Robustness notes:
            #   - We disable errexit (`set +e`) for the loop because grep -q
            #     legitimately returns 1 when the key isn't found, and we
            #     don't want that to abort the deploy.
            #   - Whitespace trim uses sed (universal) rather than bash 4+
            #     parameter-expansion tricks that have parsing edge cases.
            #   - Lines come in via a here-doc + printf rather than `<<<`
            #     so this works in plain sh too if the shell ever changes.
            ENV_CHANGED=false
            if [ -n "${EXTRA_ENV:-}" ]; then
              echo "→ syncing EXTRA_ENV secret into .env"
              touch .env
              ADDED_COUNT=0
              # Write the secret to a temp file so we can redirect into the
              # while-loop without depending on bash here-docs/here-strings
              # (which interact badly with YAML's literal-block indentation).
              EXTRA_ENV_FILE=$(mktemp)
              printf '%s\n' "$EXTRA_ENV" > "$EXTRA_ENV_FILE"
              set +e  # grep -q legitimately returns 1 when key is absent
              while IFS= read -r raw_line; do
                line=$(printf '%s' "$raw_line" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
                [ -z "$line" ] && continue
                case "$line" in
                  \#*) continue ;;
                esac
                key="${line%%=*}"
                if [ "$key" = "$line" ]; then
                  echo "  ⚠ skipping malformed EXTRA_ENV line (no '='): $line"
                  continue
                fi
                if grep -q "^${key}=" .env; then
                  continue
                fi
                printf '%s\n' "$line" >> .env
                echo "  + appended $key"
                ADDED_COUNT=$((ADDED_COUNT + 1))
              done < "$EXTRA_ENV_FILE"
              set -e
              rm -f "$EXTRA_ENV_FILE"
              if [ "$ADDED_COUNT" -gt 0 ]; then
                ENV_CHANGED=true
              else
                echo "  (nothing new — VPS .env already has every EXTRA_ENV key)"
              fi
            fi

            REBUILD_BACKEND=false
            REBUILD_FRONTEND=false
            RUN_MIGRATIONS=false
            FULL=false

            if [ "$FORCE" = "true" ] || [ "$COMPOSE" = "true" ]; then
              FULL=true
            fi
            if [ "$FULL" = "true" ] || [ "$BACKEND" = "true" ]; then
              REBUILD_BACKEND=true
            fi
            if [ "$FULL" = "true" ] || [ "$FRONTEND" = "true" ]; then
              REBUILD_FRONTEND=true
            fi
            if [ "$FULL" = "true" ] || [ "$MIGRATIONS" = "true" ]; then
              RUN_MIGRATIONS=true
            fi

            echo "→ plan: backend=$REBUILD_BACKEND frontend=$REBUILD_FRONTEND migrations=$RUN_MIGRATIONS full=$FULL"

            if [ "$FULL" = "true" ]; then
              # rm -sfv on frontend wipes its anonymous volume so a fresh
              # node_modules from the new image can populate the container.
              $DC rm -sfv frontend || true
              $DC up -d --build
            else
              if [ "$REBUILD_BACKEND" = "true" ]; then
                $DC build api worker realtime
                $DC up -d api worker realtime
              fi
              if [ "$REBUILD_FRONTEND" = "true" ]; then
                $DC rm -sfv frontend || true
                $DC build frontend
                $DC up -d frontend
              fi
              if [ "$CADDY" = "true" ]; then
                $DC restart caddy
              fi
            fi

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              echo "→ alembic upgrade head"
              $DC exec -T api alembic upgrade head
            fi

            # If we appended any new keys to .env BUT didn't already do a
            # full rebuild (which would have force-recreated everything),
            # recreate worker + api specifically so they re-read .env. A
            # plain `up -d` is a no-op when the image hash hasn't changed,
            # so we use --force-recreate.
            if [ "$ENV_CHANGED" = "true" ] && [ "$FULL" = "false" ]; then
              echo "→ env changed: force-recreating worker + api"
              $DC up -d --force-recreate worker api
            fi

            echo "→ post-deploy health"
            sleep 3
            curl -fsS http://127.0.0.1:8000/api/health | head -c 400 || true
            echo
            $DC ps
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND: ${{ needs.changes.outputs.backend }}
          FRONTEND: ${{ needs.changes.outputs.frontend }}
          MIGRATIONS: ${{ needs.changes.outputs.migrations }}
          COMPOSE: ${{ needs.changes.outputs.compose }}
          CADDY: ${{ needs.changes.outputs.caddy }}
          FORCE: ${{ inputs.force_full_rebuild || 'false' }}
          EXTRA_ENV: ${{ secrets.EXTRA_ENV }}
