# Deploy main -> VPS over SSH.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST     -- VPS hostname or IP
#   SSH_USER     -- login user (e.g. `deploy` or `root`)
#   SSH_KEY      -- private key matching an authorized_keys entry on the VPS
#   DEPLOY_PATH  -- absolute path to the repo checkout on the VPS
# Optional:
#   SSH_PORT     -- defaults to 22
#   EXTRA_ENV    -- multi-line `KEY=VALUE` block. On every deploy, any KEY in
#                   this secret that's MISSING from the VPS .env gets appended
#                   (idempotent; never overwrites). Used for new Dune query
#                   IDs / API keys without SSH'ing in. Comments (`# ...`) and
#                   blank lines are skipped. If anything was appended, the
#                   worker + api containers are force-recreated so they pick
#                   up the new env.
#
# Architecture note:
#   The actual deploy logic lives in `scripts/deploy.sh` (in the repo). The
#   inline workflow script is intentionally tiny: cd, git fetch+reset, exec
#   the script. This avoids drone-ssh's habit of prepending one `export
#   VAR=...` line per `envs:` entry, which previously made multi-line secrets
#   shift bash line numbers in the transmitted script and produced syntax
#   errors that couldn't be located in any source file.
#
#   EXTRA_ENV is not passed via `envs:` for the same reason -- it gets scp'd
#   to the VPS as a separate file (`.deploy_extra_env`) and the script reads
#   it from there, so no multi-line value ever lands in a shell `export`.
#
# Behaviour:
#   * workflow_dispatch  -> always runs, with optional "force full rebuild" toggle
#   * push to main       -> disabled until you flip ENABLE_AUTO_DEPLOY below to
#                           true (so the first run is intentional and you can
#                           watch it from the Actions tab)
#   * Only services whose source paths changed are rebuilt. A change to
#     docker-compose.yml or the workflow itself triggers a full rebuild.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Rebuild & restart every service regardless of changed paths"
        type: boolean
        default: false
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      compose: ${{ steps.filter.outputs.compose }}
      caddy: ${{ steps.filter.outputs.caddy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            migrations:
              - 'backend/alembic/versions/**'
            compose:
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
              - 'scripts/deploy.sh'
            caddy:
              - 'Caddyfile'

  deploy:
    needs: changes
    runs-on: ubuntu-latest
    # Gate auto-deploy on push behind a manual flip. The workflow_dispatch path
    # is always allowed so you can deploy from the Actions tab without flipping
    # this. Once you've verified a manual deploy works end-to-end, change this
    # condition to: if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    if: github.event_name == 'workflow_dispatch'
    steps:
      # Stage EXTRA_ENV as a local file so we can scp raw bytes to the VPS
      # without ever inlining the multi-line secret into a shell command.
      # `printf '%s'` (no trailing newline) preserves the secret verbatim;
      # the script on the VPS handles trailing-newline edge cases.
      - name: Stage EXTRA_ENV file
        env:
          EXTRA_ENV: ${{ secrets.EXTRA_ENV }}
        run: |
          if [ -n "${EXTRA_ENV:-}" ]; then
            printf '%s' "$EXTRA_ENV" > extra_env.txt
            echo "EXTRA_ENV_PRESENT=true" >> "$GITHUB_ENV"
          else
            : > extra_env.txt
            echo "EXTRA_ENV_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Copy EXTRA_ENV to VPS
        if: env.EXTRA_ENV_PRESENT == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "extra_env.txt"
          target: "${{ secrets.DEPLOY_PATH }}/"
          strip_components: 0
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH,BACKEND,FRONTEND,MIGRATIONS,COMPOSE,CADDY,FORCE,EXTRA_ENV_PRESENT
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            echo "-> git fetch && reset to origin/main"
            git fetch --prune origin
            git reset --hard origin/main
            if [ "${EXTRA_ENV_PRESENT:-false}" = "true" ] && [ -f extra_env.txt ]; then
              EXTRA_ENV=$(cat extra_env.txt)
              rm -f extra_env.txt
              export EXTRA_ENV
            fi
            export DEPLOY_PATH BACKEND FRONTEND MIGRATIONS COMPOSE CADDY FORCE
            bash scripts/deploy.sh
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND: ${{ needs.changes.outputs.backend }}
          FRONTEND: ${{ needs.changes.outputs.frontend }}
          MIGRATIONS: ${{ needs.changes.outputs.migrations }}
          COMPOSE: ${{ needs.changes.outputs.compose }}
          CADDY: ${{ needs.changes.outputs.caddy }}
          FORCE: ${{ inputs.force_full_rebuild || 'false' }}
