services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Bind host port to localhost only — the api/worker/realtime
    # containers reach redis over the internal docker network, so the
    # host mapping is only useful for local debugging via redis-cli.
    # Exposing 6379 on 0.0.0.0 invites REPLICAOF / CONFIG-SET attacks.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # Disable the dangerous commands attackers chain together to write
    # SSH keys / cron jobs / replication payloads. Renaming to "" drops them.
    command: >
      redis-server
      --rename-command CONFIG ""
      --rename-command REPLICAOF ""
      --rename-command SLAVEOF ""
      --rename-command DEBUG ""
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    dns: [1.1.1.1, 8.8.8.8]
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    dns: [1.1.1.1, 8.8.8.8]
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: arq app.workers.arq_settings.WorkerSettings
    volumes:
      - ./backend:/app

  realtime:
    build: ./backend
    dns: [1.1.1.1, 8.8.8.8]
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.realtime.listener
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
